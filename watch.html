<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Viddy" />
  <meta name="theme-color" content="#030712" />
  <title>Viddy — Watch</title>
  <link rel="icon" href="public/favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Landscape on phones: fill the screen with video, keep top bar */
    @media (orientation: landscape) and (max-height: 500px) {
      body { height: 100dvh; min-height: unset; overflow: hidden; }
      #top-bar { padding-top: 0.25rem; padding-bottom: 0.25rem; }
      #video-outer { padding: 0; min-height: 0; }
      #video-wrap { height: 100%; align-self: stretch; max-width: 100%; }
      #video-aspect { padding-bottom: 0 !important; height: 100%; }
      #player { position: static; width: 100%; height: 100%; border-radius: 0.5rem; }
    }
    /* Hide top bar when our container is fullscreen */
    #video-wrap:fullscreen #fullscreen-btn svg.expand { display: none; }
    #video-wrap:fullscreen #fullscreen-btn svg.compress { display: block; }
    #fullscreen-btn svg.compress { display: none; }
  </style>
</head>
<body class="min-h-screen bg-gray-950 flex flex-col">

  <!-- Top bar -->
  <div id="top-bar" class="flex items-center gap-3 px-4 py-3 bg-gray-900/80 backdrop-blur-sm">
    <a id="back-btn" href="index.html" class="inline-flex items-center justify-center w-9 h-9 bg-green-500 hover:bg-green-400 active:scale-90 rounded-full transition-all shadow-lg">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </a>
    <span class="text-gray-400 text-sm">Viddy</span>
  </div>

  <!-- Bedtime / time-limit overlay -->
  <div id="bedtime-overlay" class="hidden fixed inset-0 bg-gray-950 z-50 flex flex-col items-center justify-center text-center p-8">
    <div id="overlay-emoji" class="text-8xl mb-6">🌙</div>
    <h2 id="overlay-title" class="text-3xl font-bold text-white mb-3">Time to stop watching!</h2>
    <p id="bedtime-msg" class="text-gray-400 text-lg mb-8">It's bedtime. See you tomorrow!</p>
    <a id="bedtime-back" href="index.html" class="bg-gray-700 hover:bg-gray-600 text-white font-semibold px-8 py-3 rounded-full transition-colors">
      ← Back
    </a>
  </div>

  <!-- Video player -->
  <div id="video-outer" class="flex-1 flex items-center justify-center p-2 sm:p-6">
    <div id="video-wrap" class="w-full max-w-5xl">
      <div id="video-aspect" class="relative w-full" style="padding-bottom: 56.25%;">
        <div id="player" class="absolute inset-0 w-full h-full rounded-xl shadow-2xl"></div>
        <!-- Blocks clicks on the YouTube title/logo at the top of the embed player -->
        <div class="absolute top-0 left-0 right-0 z-10" style="height: 60px;"></div>
        <!-- Blocks the "Watch on YouTube" logo in the bottom-right of the player -->
        <div class="absolute bottom-0 right-0 z-10" style="width: 90px; height: 48px;"></div>
        <!-- Custom fullscreen button — fullscreens the container so overlays stay active -->
        <button id="fullscreen-btn" class="absolute bottom-0 z-10 flex items-center justify-center bg-black/40 hover:bg-black/60 text-white transition-colors rounded" style="right: 90px; width: 48px; height: 48px;" title="Fullscreen">
          <svg class="expand w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
          <svg class="compress w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // Custom fullscreen — fullscreens the container so our overlays stay active
    const fsBtn  = document.getElementById("fullscreen-btn");
    const fsWrap = document.getElementById("video-wrap");
    fsBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        fsWrap.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    });
    // Keep the icon in sync
    document.addEventListener("fullscreenchange", () => {
      fsBtn.querySelector(".expand").style.display   = document.fullscreenElement ? "none"  : "";
      fsBtn.querySelector(".compress").style.display = document.fullscreenElement ? ""      : "none";
    });
  </script>

  <script type="module">
    import { db } from "./js/firebase-config.js";
    import { doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const params     = new URLSearchParams(location.search);
    const videoId    = params.get("v");
    const from       = params.get("from");
    const uid        = params.get("uid");
    const videoTitle = params.get("title") || videoId;
    const channelName = params.get("ch") || "";

    if (!videoId || !/^[\w-]{11}$/.test(videoId)) { location.href = "index.html"; }
    if (from) {
      document.getElementById("back-btn").href = `channel.html?id=${from}${uid ? "&uid=" + uid : ""}`;
    }

    // ── Load YouTube IFrame API ───────────────────────────────────────────────
    // Resolves when YT.Player constructor is available
    const ytReady = new Promise(resolve => { window.onYouTubeIframeAPIReady = resolve; });
    const ytScript = document.createElement("script");
    ytScript.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(ytScript);

    function createPlayer(onStateChange) {
      return new YT.Player("player", {
        videoId,
        host: "https://www.youtube-nocookie.com",
        width: "100%",
        height: "100%",
        playerVars: { rel: 0, modestbranding: 1, playsinline: 1, autoplay: 1 },
        events: { onStateChange },
      });
    }

    // ── Watch tracking + enforcement ─────────────────────────────────────────
    if (uid) {
      const todayStr     = new Date().toISOString().slice(0, 10);
      const todayKey     = `viddy-watched-${uid}-${todayStr}`;
      const watchTimeRef = doc(db, "users", uid, "watchTime", todayStr);
      let alreadyWatchedSecs = parseInt(localStorage.getItem(todayKey) || "0", 10);

      const scheduleRef = doc(db, "users", uid, "status", "schedule");
      let currentSchedule = null;
      let overlayShown    = false;
      let ytPlayer        = null;

      // Accurate play-time tracking — only counts seconds the video is actually playing
      let playedSecs     = 0;
      let playSegStart   = null;

      function currentPlayedSecs() {
        return playedSecs + (playSegStart ? Math.floor((Date.now() - playSegStart) / 1000) : 0);
      }

      function isBedtime(s) {
        if (!s) return false;
        if (s.forceStopped) return true;
        if (!s.enabled || !s.bedtime) return false;
        const now = new Date();
        const nowMins = now.getHours() * 60 + now.getMinutes();
        const [h, m] = s.bedtime.split(":").map(Number);
        return nowMins >= h * 60 + m;
      }

      function isOverTimeLimit(s) {
        if (!s?.timeLimitEnabled || !s?.timeLimitMins) return false;
        return (alreadyWatchedSecs + currentPlayedSecs()) >= s.timeLimitMins * 60;
      }

      // saveDuration is wired up once the player starts; stub until then
      let saveDuration = () => {};

      function enforceSchedule(s) {
        if (!isBedtime(s) && !isOverTimeLimit(s)) return false;
        if (overlayShown) return true;
        overlayShown = true;
        saveDuration();
        if (ytPlayer?.stopVideo) ytPlayer.stopVideo();
        const emoji = document.getElementById("overlay-emoji");
        const title = document.getElementById("overlay-title");
        const msg   = document.getElementById("bedtime-msg");
        if (s.forceStopped) {
          emoji.textContent = "🛑"; title.textContent = "Watching stopped!";
          msg.textContent = "A parent has stopped watching for now.";
        } else if (isOverTimeLimit(s)) {
          emoji.textContent = "⏰"; title.textContent = "Screen time is up for today!";
          msg.textContent = `You've reached your ${s.timeLimitMins} minute daily limit. See you tomorrow!`;
        } else {
          emoji.textContent = "🌙"; title.textContent = "Time to stop watching!";
          msg.textContent = "It's bedtime. See you tomorrow!";
        }
        document.getElementById("bedtime-overlay").classList.remove("hidden");
        if (from) document.getElementById("bedtime-back").href =
          `channel.html?id=${from}&uid=${uid}`;
        return true;
      }

      // Wait for the YT API, schedule check, AND today's cross-device watch total
      const schedulePromise  = getDoc(scheduleRef)
        .then(snap => snap.exists() ? snap.data() : null)
        .catch(() => null);
      const watchTimePromise = getDoc(watchTimeRef)
        .then(snap => snap.exists() ? (snap.data().totalSeconds || 0) : 0)
        .catch(() => 0);

      Promise.all([ytReady, schedulePromise, watchTimePromise]).then(([, schedule, firestoreSecs]) => {
        // Sync today's total across devices — take whichever is higher
        alreadyWatchedSecs = Math.max(alreadyWatchedSecs, firestoreSecs);
        localStorage.setItem(todayKey, alreadyWatchedSecs);

        currentSchedule = schedule;
        if (enforceSchedule(currentSchedule)) return; // already over limit — don't start

        // ── Start player ────────────────────────────────────────────────────
        ytPlayer = createPlayer(e => {
          if (e.data === YT.PlayerState.PLAYING) {
            // Video started/resumed — begin timing this segment
            if (!playSegStart) playSegStart = Date.now();
          } else {
            // Paused, ended, buffering — close the current segment
            if (playSegStart) {
              playedSecs += Math.floor((Date.now() - playSegStart) / 1000);
              playSegStart = null;
            }
          }
          enforceSchedule(currentSchedule);
        });

        // ── Firestore tracking ───────────────────────────────────────────────
        const sessionId     = Date.now().toString();
        const sessionRef    = doc(db, "users", uid, "watchHistory", sessionId);
        const nowPlayingRef = doc(db, "users", uid, "status", "nowPlaying");
        const videoData     = {
          videoId, videoTitle, channelId: from || "", channelName,
          thumbnail: `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`,
          startedAt: new Date().toISOString(), durationSeconds: 0,
        };
        setDoc(sessionRef, videoData).catch(err => console.error("[Viddy] watchHistory write failed:", err));
        setDoc(nowPlayingRef, videoData).catch(err => console.error("[Viddy] nowPlaying write failed:", err));

        saveDuration = function() {
          const secs = currentPlayedSecs();
          if (secs < 2) return;
          const totalSecs = alreadyWatchedSecs + secs;
          updateDoc(sessionRef, { durationSeconds: secs, endedAt: new Date().toISOString() }).catch(() => {});
          updateDoc(nowPlayingRef, { durationSeconds: secs }).catch(() => {});
          setDoc(watchTimeRef, { totalSeconds: totalSecs }, { merge: true }).catch(() => {});
          localStorage.setItem(todayKey, totalSecs);
        };

        function clearNowPlaying() { deleteDoc(nowPlayingRef).catch(() => {}); }

        setInterval(saveDuration, 30000);
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) { saveDuration(); clearNowPlaying(); }
        });
        window.addEventListener("pagehide", () => { saveDuration(); clearNowPlaying(); });

        // Real-time schedule listener (Stop Now / Resume)
        onSnapshot(scheduleRef, snap => {
          currentSchedule = snap.exists() ? snap.data() : null;
          enforceSchedule(currentSchedule);
        });

        // Check time limit every 5 seconds
        setInterval(() => enforceSchedule(currentSchedule), 5000);

      }).catch(() => {
        // Firestore error — fail open, start player without tracking
        ytReady.then(() => createPlayer(() => {}));
      });

    } else {
      // No uid — just play, no tracking needed
      ytReady.then(() => createPlayer(() => {}));
    }
  </script>

  <!-- Powered by Streamwave Productions -->
  <div class="text-center py-4 opacity-50">
    <p class="text-gray-500 text-xs uppercase tracking-widest mb-2">Powered by</p>
    <img src="public/StreaWaveProd-LogoTrans-White.png" alt="StreamWave Productions" class="h-14 w-auto mx-auto" />
  </div>
</body>
</html>
